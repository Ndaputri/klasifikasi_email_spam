<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasifikai Email Spam Bahasa Indonesia Mengunakan Algoritma Support Vector Machine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                        'space': ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                       primary: {
        50: '#fdf2f8',
        100: '#fce7f3',
        200: '#fbcfe8',
        300: '#f9a8d4',
        400: '#f472b6',
        500: '#ec4899',
        600: '#db2777',
        700: '#be185d',
        800: '#9d174d',
        900: '#831843',
        950: '#500724',
    }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .gradient-bg {
    background: linear-gradient(135deg, #f9a8d4 0%, #f472b6 25%, #ec4899 50%, #db2777 75%, #be185d 100%);
}
        
       .gradient-bg-animated {
    background: linear-gradient(-45deg, #f9a8d4, #f472b6, #ec4899, #db2777, #be185d);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
}
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
       .gradient-text {
    background: linear-gradient(135deg, #ec4899 0%, #db2777 50%, #be185d 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
        
        .glass {
            background: rgba(236, 72, 153, ...);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-dark {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
       .glow {
    box-shadow: 0 0 60px rgba(236, 72, 153, 0.3);
}

.glow-sm {
    box-shadow: 0 0 30px rgba(236, 72, 153, 0.2);
}
        
        .glow-green {
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.3);
        }
        
        .shine {
            position: relative;
            overflow: hidden;
        }
        
        .shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(30deg);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }
        
        .blob {
            animation: blob 8s infinite;
        }
        
        @keyframes blob {
            0%, 100% { border-radius: 60% 40% 30% 70%/60% 30% 70% 40%; }
            25% { border-radius: 30% 60% 70% 40%/50% 60% 30% 60%; }
            50% { border-radius: 50% 60% 30% 60%/30% 60% 70% 40%; }
            75% { border-radius: 60% 40% 60% 30%/60% 30% 40% 70%; }
        }
        
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
           .particle {
    background: rgba(236, 72, 153, 0.4);
}
            border-radius: 50%;
            animation: particle 20s infinite linear;
        }
        
        @keyframes particle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }
        
        .pulse-border {
            animation: pulse-border 2s ease-in-out infinite;
        }
        
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(239, 68, 68, 0.3); }
            50% { border-color: rgba(239, 68, 68, 0.8); }
        }
        
        .typing-indicator span {
            animation: typing 1.4s infinite both;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .result-card {
            animation: slideUp 0.5s ease-out forwards;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
       ::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, #ec4899, #be185d);
}
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ef4444, #991b1b);
            border-radius: 4px;
        }
        
        textarea:focus {
            outline: none;
        }
        
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
           .scan-line {
    background: linear-gradient(90deg, transparent, #ec4899, transparent);

            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { top: 0; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body class="bg-gray-950 font-inter antialiased min-h-screen">

        <div class="absolute -bottom-40 -left-40 w-[400px] h-[400px] bg-gradient-to-tr ffrom-pink-600/10 to-pink-800/5 rounded-full blur-3xl blob" style="animation-delay: 3s;"></div>
    </div>

    <!-- Navigation -->
    <nav class="relative z-50 px-4 pt-4">
        <div class="max-w-6xl mx-auto">
            <div class="glass-dark rounded-2xl px-6">
                <div class="flex justify-between items-center h-16">
                    <a href="/" class="flex items-center space-x-3">
                        <div class="w-12 h-12 gradient-bg-animated rounded-2xl flex items-center justify-center glow-sm shine">
                            <i class="fas fa-shield-alt text-white text-xl"></i>
                        </div>
                        <div>
                            <span class="text-xl font-bold text-white font-space">Klasifikai Email Spam Bahasa Indonesia Mengunakan Algoritma </span>
                            <span class="text-xl font-bold gradient-text font-space"> Support Vector Machine</span>
                        </div>
                    </a>
                    <a href="/" class="flex items-center space-x-2 text-gray-400 hover:text-white transition-colors px-4 py-2 rounded-xl hover:bg-white/10">
                        <i class="fas fa-arrow-left"></i>
                        <span class="font-medium">Kembali</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 max-w-6xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-white mb-6 font-space">
                <i class="fas fa-envelope-open-text gradient-text mr-4"></i>
                Klasifikasi Email <span class="gradient-text">Spam</span>
            </h1>
            <p class="text-xl text-gray-400 max-w-2xl mx-auto">
                Masukkan teks email di bawah ini untuk memeriksa apakah email tersebut 
                <span class="text-red-400 font-semibold">spam</span> atau <span class="text-green-400 font-semibold">Ham</span>.
            </p>
        </div>

        <!-- Input Form Section -->
        <div class="max-w-4xl mx-auto">
            <div class="glass rounded-3xl p-8 border border-white/10 glow-sm">
                <!-- Sample Emails - Now Above Form -->
                <div class="mb-8">
                    <h3 class="text-lg font-bold text-white mb-4 flex items-center font-space">
                        <i class="fas fa-clipboard-list gradient-text mr-3"></i>
                        Coba Contoh Email
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <button 
                            onclick="loadSampleSpam()"
                            class="p-4 bg-red-500/10 rounded-2xl border border-red-500/30 hover:border-red-500/60 hover:bg-red-500/20 transition-all text-left group"
                        >
                            <div class="flex items-center mb-2">
                                <div class="w-10 h-10 bg-red-500/20 rounded-xl flex items-center justify-center mr-3 group-hover:scale-110 transition-transform">
                                    <i class="fas fa-exclamation-triangle text-red-400 text-lg"></i>
                                </div>
                                <div>
                                    <span class="font-bold text-red-400 block">Spam</span>
                                    <p class="text-xs text-gray-500">Lottery scam</p>
                                </div>
                            </div>
                        </button>
                        
                       
                        
                        <button 
                            onclick="loadSampleHam()"
                            class="p-4 bg-green-500/10 rounded-2xl border border-green-500/30 hover:border-green-500/60 hover:bg-green-500/20 transition-all text-left group"
                        >
                            <div class="flex items-center mb-2">
                                <div class="w-10 h-10 bg-green-500/20 rounded-xl flex items-center justify-center mr-3 group-hover:scale-110 transition-transform">
                                    <i class="fas fa-check-circle text-green-400 text-lg"></i>
                                </div>
                                <div>
                                    <span class="font-bold text-green-400 block">Aman</span>
                                    <p class="text-xs text-gray-500">Business email</p>
                                </div>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Form -->
                <form id="predict-form" onsubmit="submitForm(event)">
                    <div class="mb-6">
                        <label for="email_text" class="flex items-center text-lg font-semibold text-white mb-4 font-space">
                            <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center mr-3">
                                <i class="fas fa-envelope text-white"></i>
                            </div>
                            Teks Email
                        </label>
                        <div class="relative">
                            <textarea 
                                name="email_text" 
                                id="email_text" 
                                rows="10" 
                                class="w-full px-6 py-4 bg-gray-900/50 border-2 border-white/10 rounded-2xl text-white placeholder-gray-500 focus:border-red-500/50 transition-all resize-none pulse-border"
                                placeholder="Paste atau ketik teks email di sini untuk dianalisis..."
                                required
                            ></textarea>
                            <div class="absolute bottom-4 right-4 text-gray-500 text-sm">
                                <span id="char-count">0</span> karakter
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4">
                        <button 
                            type="submit" 
                            id="submit-btn"
                            class="flex-1 gradient-bg-animated text-white px-8 py-4 rounded-2xl font-bold text-lg hover:scale-[1.02] transition-all shadow-xl shadow-pink-500/30 flex items-center justify-center shine disabled:opacity-70 disabled:cursor-not-allowed disabled:hover:scale-100"
                        >
                            <span id="btn-text" class="flex items-center">
                                <i class="fas fa-search mr-3"></i>
                                Analisis Email
                                <i class="fas fa-arrow-right ml-3"></i>
                            </span>
                            <span id="btn-loader" class="hidden items-center">
                                <svg class="animate-spin h-6 w-6 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Menganalisis...
                            </span>
                        </button>
                        <button 
                            type="button" 
                            onclick="clearAll()"
                            class="px-8 py-4 rounded-2xl font-bold text-lg glass text-white border border-white/20 hover:border-red-500/50 hover:bg-red-500/10 transition-all flex items-center justify-center"
                        >
                            <i class="fas fa-eraser mr-2"></i>
                            Clear All
                        </button>
                    </div>
                </form>

                <!-- Quick Tips -->
                <div class="mt-6 pt-6 border-t border-white/10">
                    <div class="flex flex-wrap gap-4 justify-center text-xs text-gray-500">
                        <span class="flex items-center">
                            <i class="fas fa-check text-green-400 mr-2"></i>
                            Paste seluruh isi email
                        </span>
                        <span class="flex items-center">
                            <i class="fas fa-check text-green-400 mr-2"></i>
                            Termasuk subject & body
                        </span>
                        <span class="flex items-center">
                            <i class="fas fa-check text-green-400 mr-2"></i>
                            Bahasa Indonesia

            </div>
        </div>

        <!-- Result Section (Dynamic) -->
        <div class="max-w-4xl mx-auto mt-12 result-card hidden" id="result-section">
            <!-- Will be populated by JavaScript -->
        </div>
    </main>
                            <div class="w-40 h-40 bg-green-500/20 rounded-full flex items-center justify-center border-4 border-green-500/50">
                                <i class="fas fa-check-circle text-green-400 text-6xl"></i>
                            </div>
                            <div class="absolute -bottom-2 -right-2 w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white font-bold shadow-lg shadow-green-500/50">
                                <i class="fas fa-check"></i>
                            </div>
 

    <script>
        // Character counter
        const textarea = document.getElementById('email_text');
        const charCount = document.getElementById('char-count');
        const resultSection = document.getElementById('result-section');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        
        textarea.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });
        
        // Initialize character count
        charCount.textContent = textarea.value.length;

        function showLoader() {
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            btnLoader.classList.add('flex');
        }

        function hideLoader() {
            submitBtn.disabled = false;
            btnText.classList.remove('hidden');
            btnLoader.classList.add('hidden');
            btnLoader.classList.remove('flex');
        }

        async function submitForm(event) {
            event.preventDefault();
            
            const emailText = textarea.value.trim();
            if (!emailText) {
                alert('Mohon masukkan teks email terlebih dahulu');
                return;
            }

            showLoader();

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email_text: emailText })
                });

                const result = await response.json();
                displayResult(result);
            } catch (error) {
                console.error('Error:', error);
                displayResult({
                    success: false,
                    error: 'Terjadi kesalahan saat menghubungi server. Silakan coba lagi.'
                });
            } finally {
                hideLoader();
            }
        }

        function displayResult(result) {
            let html = '';
            
            if (result.success) {
                const isSpam = result.is_spam;
                const colorClass = isSpam ? 'red' : 'green';
                const glowClass = isSpam ? 'glow' : 'glow-green';
                const headerBg = isSpam ? 'gradient-bg-animated' : 'bg-gradient-to-r from-green-600 to-green-700';
                const icon = isSpam ? 'exclamation-triangle' : 'shield-alt';
                const iconAnim = isSpam ? 'animate-pulse' : '';
                
                html = `
                    <div class="glass rounded-3xl overflow-hidden border border-white/10 ${glowClass}">
                        <!-- Result Header -->
                        <div class="${headerBg} px-8 py-5">
                            <h2 class="text-2xl font-bold text-white flex items-center font-space">
                                <i class="fas fa-${icon} mr-4 ${iconAnim}"></i>
                                Hasil Analisis
                            </h2>
                        </div>
                        
                        <div class="p-8">
                            <!-- Main Result Display -->
                            <div class="flex flex-col lg:flex-row items-center justify-center gap-10 mb-10">
                                <!-- Icon -->
                                <div class="relative">
                                    <div class="w-40 h-40 bg-${colorClass}-500/20 rounded-full flex items-center justify-center border-4 border-${colorClass}-500/50 ${isSpam ? 'animate-pulse' : ''}">
                                        <i class="fas fa-${isSpam ? 'exclamation-triangle' : 'check-circle'} text-${colorClass}-400 text-6xl"></i>
                                    </div>
                                    <div class="absolute -bottom-2 -right-2 w-12 h-12 bg-${colorClass}-500 rounded-full flex items-center justify-center text-white font-bold shadow-lg shadow-${colorClass}-500/50">
                                        <i class="fas fa-${isSpam ? 'times' : 'check'}"></i>
                                    </div>
                                </div>
                                
                                <!-- Result Text -->
                                <div class="text-center lg:text-left">
                                    <div class="text-5xl lg:text-6xl font-extrabold text-${colorClass}-500 mb-3 font-space">${isSpam ? 'SPAM!' : 'AMAN'}</div>
                                    <p class="text-xl text-gray-400">Email ini ${isSpam ? '<span class="text-red-400 font-semibold">berbahaya</span> dan terdeteksi sebagai spam.' : 'terdeteksi <span class="text-green-400 font-semibold">legitimate</span> dan aman.'}</p>
                                </div>
                            </div>

                            <!-- Stats Cards -->
                            <div class="grid sm:grid-cols-2 gap-6 mb-10">
                                <div class="glass rounded-2xl p-6 border border-white/10 hover:border-${colorClass}-500/30 transition-all">
                                    <div class="flex items-center justify-between mb-3">
                                        <span class="text-gray-400 text-sm">Prediksi</span>
                                        <i class="fas fa-tag text-${colorClass}-400"></i>
                                    </div>
                                    <div class="text-2xl font-bold text-${colorClass}-400 font-space">
                                        ${result.prediction}
                                    </div>
                                </div>
                                
                                <div class="glass rounded-2xl p-6 border border-white/10 hover:border-${colorClass}-500/30 transition-all">
                                    <div class="flex items-center justify-between mb-3">
                                        <span class="text-gray-400 text-sm">Confidence Score</span>
                                        <i class="fas fa-chart-line text-blue-400"></i>
                                    </div>
                                    ${result.confidence !== null ? `
                                        <div class="text-2xl font-bold text-white font-space mb-2">${result.confidence.toFixed(1)}%</div>
                                        <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
                                            <div class="h-full ${isSpam ? 'gradient-bg-animated' : 'bg-gradient-to-r from-green-500 to-green-600'} rounded-full transition-all duration-1000" 
                                                 style="width: ${result.confidence}%;"></div>
                                        </div>
                                    ` : `
                                        <div class="text-2xl font-bold text-gray-500 font-space">N/A</div>
                                        <p class="text-xs text-gray-500 mt-1">Model tidak mendukung probabilitas</p>
                                    `}
                                </div>
                            </div>

                            <!-- Recommendation -->
                            <div class="bg-${colorClass}-500/10 border-${colorClass}-500/30 rounded-2xl p-6 border-2">
                                <h3 class="font-bold text-${colorClass}-400 mb-4 flex items-center text-lg font-space">
                                    <i class="fas fa-lightbulb mr-3"></i>
                                    Rekomendasi
                                </h3>
                                ${isSpam ? `
                                    <ul class="space-y-3">
                                        <li class="flex items-start text-gray-300">
                                            <i class="fas fa-times-circle text-red-400 mr-3 mt-1"></i>
                                            <span><strong>Jangan klik</strong> link apapun dalam email ini</span>
                                        </li>
                                        <li class="flex items-start text-gray-300">
                                            <i class="fas fa-times-circle text-red-400 mr-3 mt-1"></i>
                                            <span><strong>Jangan membalas</strong> atau memberikan informasi pribadi</span>
                                        </li>
                                        <li class="flex items-start text-gray-300">
                                            <i class="fas fa-trash-alt text-red-400 mr-3 mt-1"></i>
                                            <span><strong>Segera hapus</strong> email ini dari inbox Anda</span>
                                        </li>
                                        <li class="flex items-start text-gray-300">
                                            <i class="fas fa-flag text-red-400 mr-3 mt-1"></i>
                                            <span><strong>Laporkan</strong> sebagai spam jika memungkinkan</span>
                                        </li>
                                    </ul>
                                ` : `
                                    <ul class="space-y-3">
                                        <li class="flex items-start text-gray-300">
                                            <i class="fas fa-check-circle text-green-400 mr-3 mt-1"></i>
                                            <span>Email ini <strong>terlihat aman</strong> untuk dibaca</span>
                                        </li>
                                        <li class="flex items-start text-gray-300">
                                            <i class="fas fa-info-circle text-green-400 mr-3 mt-1"></i>
                                            <span>Tetap <strong>berhati-hati</strong> dengan link dan attachment</span>
                                        </li>
                                        <li class="flex items-start text-gray-300">
                                            <i class="fas fa-user-check text-green-400 mr-3 mt-1"></i>
                                            <span><strong>Verifikasi pengirim</strong> jika masih ragu</span>
                                        </li>
                                    </ul>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="glass rounded-3xl overflow-hidden border border-white/10">
                        <div class="bg-gradient-to-r from-yellow-600 to-yellow-700 px-8 py-5">
                            <h2 class="text-2xl font-bold text-white flex items-center font-space">
                                <i class="fas fa-exclamation-circle mr-4"></i>
                                Hasil Analisis
                            </h2>
                        </div>
                        <div class="p-8">
                            <div class="bg-yellow-500/10 border-2 border-yellow-500/30 rounded-2xl p-8 text-center">
                                <i class="fas fa-exclamation-triangle text-yellow-400 text-5xl mb-4"></i>
                                <h3 class="text-2xl font-bold text-yellow-400 mb-3 font-space">Oops! Terjadi Kesalahan</h3>
                                <p class="text-gray-400 text-lg">${result.error}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            resultSection.innerHTML = html;
            resultSection.classList.remove('hidden');
            resultSection.style.opacity = '0';

        function clearAll() {
            // Clear textarea
            textarea.value = '';
            charCount.textContent = '0';
            
            // Hide result section with animation
            if (resultSection && !resultSection.classList.contains('hidden')) {
                resultSection.style.transition = 'all 0.3s ease-out';
                resultSection.style.opacity = '0';
                resultSection.style.transform = 'translateY(30px)';
                setTimeout(() => {
                    resultSection.classList.add('hidden');
                    resultSection.innerHTML = '';
                }, 300);
            }
        }
